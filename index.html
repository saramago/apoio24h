<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falar agora</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <main class="voice-shell">
        <section class="voice-stage">
            <p class="voice-prompt">Diga o que tem na cabeca</p>
            <button type="button" id="record-button" class="record-button">Falar agora</button>
            <p id="status-text" class="status-text">Primeira resposta gratuita.</p>
            <p id="timer-text" class="timer-text hidden">A gravar...</p>
        </section>

        <section id="transcript-panel" class="voice-card hidden">
            <p class="voice-label">O que disse</p>
            <p id="transcript-text" class="voice-copy"></p>
        </section>

        <section id="response-panel" class="voice-card hidden">
            <p class="voice-label">Resposta</p>
            <p id="response-text" class="voice-copy"></p>
        </section>

        <section id="payment-panel" class="voice-card hidden">
            <p class="voice-label">Continuar</p>
            <p class="voice-copy">Pode continuar por 1€.</p>
            <form id="payment-form" class="payment-form">
                <input id="phone-input" name="customer_phone" type="tel" placeholder="Numero MB WAY" required>
                <button type="submit" class="pay-button">Continuar por 1€</button>
            </form>
            <p id="payment-note" class="helper-text"></p>
        </section>

        <footer class="voice-footer">
            <span>Privado</span>
            <span>Sem gravacao permanente</span>
            <span>Sem julgamento</span>
        </footer>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
